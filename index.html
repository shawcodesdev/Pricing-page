<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pricing Page</title>
</head>
<body>
    <div class="wrapper">
        <div class="heading">
            <div class="firstLine">Our Pricing</div>
            <div class="secondLine">
                <span class="annually">Annually</span>
                <span class="toggle">
                    <label class ="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </span>
                
                <span class="monthly">Monthly</span>
            </div>
        </div>
        <div class="options">
            <div class="option1">
                <section>Basic</section>
                <span class="price" id="price1">₹1999.99</span>
                <section class="lines-basic"><hr /></section>
                <section class="detail">500Gb Storage</section>
                <section class="lines-basic"><hr /></section>
                <section class="detail">2 Users Allowed</section>
                <section class="lines-basic"><hr /></section>
                <section class="detail">Send upto 3Gb</section>
                <section class="lines-basic"><hr /></section>
                <div class="learn-more">
                    <button class="details" id="basic-learn-more">LEARN MORE</button>
                </div>
            </div>
            <div class="option2">
                <section>Professional</section>
                <span class="price" id="price2">₹2499.99</span>
                <section class="lines-prof"><hr /></section>
                <section class="detail">1TB Storage</section>
                <section class="lines-prof"><hr /></section>
                <section class="detail">5 Users Allowed</section>
                <section class="lines-prof"><hr /></section>
                <section class="detail">Send upto 10Gb</section>
                <section class="lines-prof"><hr /></section>
                <div class="learn-more">
                    <button class="details" id="prof-learn-more">LEARN MORE</button>
                </div>
            </div>
            <div class="option1">
                <section>Master</section>
                <span class="price" id="price3">₹3999.99</span>
                <section class="lines-master"><hr /></section>
                <section class="detail">2TB Storage</section>
                <section class="lines-master"><hr /></section>
                <section class="detail">10 Users Allowed</section>
                <section class="lines-master"><hr /></section>
                <section class="detail">Send upto 20GB</section>
                <section class="lines-master"><hr /></section>
                <div class="learn-more">
                    <button class="details" id="master-learn-more">LEARN MORE</button>
                </div>
            </div>
            
        </div>


    </div>

    <script src="script.js"></script>
</body>
</html>
